name: Load dotenv file
description: Load KEY=VALUE lines from a .env file into GITHUB_ENV

inputs:
  path:
    description: Path to directory containing .env
    required: false
    default: "."
  mode:
    description: Optional mode suffix (e.g. local => .env.local)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Export variables from .env
      shell: bash
      run: |
        set -euo pipefail

        base_dir="${{ inputs.path }}"
        mode="${{ inputs.mode }}"
        env_file="$base_dir/.env"
        if [ -n "$mode" ]; then
          env_file="$base_dir/.env.$mode"
        fi

        if [ ! -f "$env_file" ]; then
          echo "env file not found: $env_file" >&2
          exit 1
        fi

        while IFS= read -r line || [ -n "$line" ]; do
          # Skip blank lines and comments
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          echo "$line" >> "$GITHUB_ENV"
        done < "$env_file"